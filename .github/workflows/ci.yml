name: ESP-IDF Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:v5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build relay_control firmware
        run: |
          . /opt/esp/idf/export.sh
          cd .
          idf.py set-target esp32
          idf.py build

